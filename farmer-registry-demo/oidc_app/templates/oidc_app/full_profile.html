<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinku Hospital | Full Profile</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        header.navbar {
            background-color: #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
        }
        .navbar-brand {
            color: #f8c94e;
            font-size: 1.75rem;
            display: flex;
            align-items: center;
        }
        .logout-btn {
            background-color: #f8c94e;
            border: none;
            color: #1a1a2e;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 6px;
        }
        .logout-btn:hover {
            background-color: #e3b63b;
        }
        .card {
            background-color: #162447;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            margin-top: 40px;
        }
        .card-title {
            color: #f8c94e;
            font-weight: 600;
        }
        .list-group-item {
            background-color: #0f3460;
            border-color: #f8c94e;
            color: white;
        }
    </style>
</head>

<body>
<header class="navbar navbar-dark">
    <a class="navbar-brand">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966484.png" alt="Logo" width="50" height="50">
        Dinku Hospital | ድንቁ ሆስፒታል
    </a>
    <button class="logout-btn" id="logoutBtn">Logout</button>
</header>

<main class="container my-5">
    <h1 class="display-4 text-center mb-4">Full Profile</h1>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Integrated Hospital Profile</h5>
            <ul id="profileList" class="list-group list-group-flush"></ul>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const profile = JSON.parse(localStorage.getItem('profileData'));
    const list = document.getElementById('profileList');
    if (!profile) {
        list.innerHTML = "<li class='list-group-item'>No data available.</li>";
        return;
    }
    const items = [
        ["Name", profile.name],
        ["Email", profile.email],
        ["Gender", profile.gender],
        ["Phone", profile.phone],
        ["Nationality", profile.residence_status],
        ["Date of Birth", profile.birthdate],
        ["Address", profile.address],
        ["Blood Type", profile.bloodType],
        ["Weight", profile.weight + " kg"],
        ["Height", profile.height + " cm"]
    ];
    items.forEach(([key, value]) => {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.innerHTML = `<strong>${key}:</strong> ${value}`;
        list.appendChild(li);
    });
});

document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('profileData');
    window.location.href = '/';
});
</script>
</body>
</html>
