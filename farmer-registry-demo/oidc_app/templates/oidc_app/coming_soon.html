<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Bank - Coming Soon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .coming-soon-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .coming-soon-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ffc107, #ff9800);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .feature-info {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
        }

        .feature-info h3 {
            color: #1e3c72;
            margin-bottom: 15px;
            text-align: center;
        }

        .feature-list {
            list-style: none;
            padding: 0;
        }

        .feature-list li {
            padding: 10px 0;
            color: #666;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feature-list li i {
            color: #ffc107;
            font-size: 1.2rem;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        .btn.secondary {
            background: #f8f9fa;
            color: #1e3c72;
            border: 2px solid #1e3c72;
        }

        .btn.secondary:hover {
            background: #1e3c72;
            color: white;
        }

        .notice {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            color: #1976d2;
            font-size: 0.9rem;
        }

        .notice i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="coming-soon-container">
        <div class="coming-soon-icon">
            <i class="fas fa-tools"></i>
        </div>
        <h1>Coming Soon</h1>
        <p class="subtitle">This feature is currently under development</p>
        
        <div class="feature-info">
            <h3>Upcoming Features</h3>
            <ul class="feature-list">
                <li><i class="fas fa-paper-plane"></i> Money Transfer</li>
                <li><i class="fas fa-receipt"></i> Bill Payment</li>
                <li><i class="fas fa-credit-card"></i> Card Management</li>
                <li><i class="fas fa-headset"></i> Customer Support</li>
                <li><i class="fas fa-plus"></i> Deposit Services</li>
                <li><i class="fas fa-minus"></i> Withdrawal Services</li>
            </ul>
        </div>

        <a href="/dashboard/" class="btn">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>

        <a href="/logout/" class="btn secondary">
            <i class="fas fa-sign-out-alt"></i>
            Logout
        </a>

        <div class="notice">
            <i class="fas fa-info-circle"></i>
            We're working hard to bring you these features. Stay tuned for updates!
        </div>
    </div>
</body>
</html>
